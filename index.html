<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Worms-lite Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="ui">
    <div id="info">Turn: <span id="turn">1</span></div>

    <div class="control">
      <label>Ángulo <span id="angleVal">45</span>°</label>
      <input id="angle" type="range" min="5" max="175" value="45">
    </div>

    <div class="control">
      <label>Potencia <span id="powerVal">40</span></label>
      <input id="power" type="range" min="10" max="120" value="40">
    </div>

    <div id="buttons">
      <button id="fire">FIRE</button>
      <button id="reset">RESET</button>
    </div>

    <div id="hint">Pulsa FIRE para lanzar. Destrucción simple de terreno.</div>
  </div>

  <script src="main.js"></script>
</body>
</html>
